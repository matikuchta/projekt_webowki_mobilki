services:
  db:
    image: mariadb:11.4
    container_name: projekt_webowki_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: projektpalacz
      MARIADB_USER: app
      MARIADB_PASSWORD: app_password
      MARIADB_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
